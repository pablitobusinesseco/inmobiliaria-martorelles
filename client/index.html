<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Inmobiliaria Martorelles - Tu hogar, nuestra prioridad</title>
  <meta name="description" content="Agencia inmobiliaria en Martorelles. Compra, venta y alquiler de propiedades en el Vallès Oriental. Tu hogar, nuestra prioridad." />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>

<body>
  <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="contact" />
    <input type="text" name="bot-field" />
    <input type="text" name="name" />
    <input type="email" name="email" />
    <input type="tel" name="phone" />
    <select name="subject">
      <option value="compra"></option>
      <option value="venta"></option>
      <option value="alquiler"></option>
      <option value="valoracion"></option>
      <option value="otro"></option>
    </select>
    <textarea name="message"></textarea>
  </form>

  <div id="root"></div>

  <script type="module" src="/src/main.tsx"></script>
  
  <script
    defer
    src="%VITE_ANALYTICS_ENDPOINT%/umami"
    data-website-id="%VITE_ANALYTICS_WEBSITE_ID%">
  </script>
</body>

</html>
